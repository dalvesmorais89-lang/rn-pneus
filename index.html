<!DOCTYPE html>

<html lang="pt-br">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>RN PNEUS - VITRINE COMPLETA</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
</head>  
<body class="bg-gray-900 text-gray-100 font-sans">  <header class="bg-black p-6 text-center border-b-4 border-red-600 sticky top-0 z-50">  
    <h1 class="text-4xl font-black italic text-yellow-500 tracking-tighter uppercase">RN PNEUS</h1>  
    <p class="text-[10px] font-bold text-white uppercase mt-1 tracking-widest">Belo Horizonte | Retirada Imediata</p>  
</header>  

<div class="bg-yellow-500 text-black p-3 text-center">  
    <p class="text-xs font-black uppercase italic">📍 RUA SILVA BARBOSA 250 Tirol </p>  
    <a href="https://www.google.com/maps/search/?api=1&query=RN+PNEUS+BELO+HORIZONTE" class="text-[10px] underline font-extrabold uppercase block mt-1">Clique aqui para abrir no Google Maps</a>  
</div>  

<nav class="bg-gray-800 p-4 overflow-x-auto flex gap-2 sticky top-[108px] z-40 border-b border-gray-700 justify-start md:justify-center">  
    <button onclick="filtrar('todos')" class="bg-white text-black px-4 py-2 rounded-full text-xs font-black uppercase">Todos</button>  
    <button onclick="filtrar('14')" class="bg-gray-700 px-4 py-2 rounded-full text-xs font-bold uppercase">Aro 14</button>  
    <button onclick="filtrar('15')" class="bg-gray-700 px-4 py-2 rounded-full text-xs font-bold uppercase">Aro 15</button>  
    <button onclick="filtrar('16')" class="bg-gray-700 px-4 py-2 rounded-full text-xs font-bold uppercase">Aro 16</button>  
    <button onclick="filtrar('17')" class="bg-gray-700 px-4 py-2 rounded-full text-xs font-bold uppercase">Aro 17</button>  
    <button onclick="filtrar('18')" class="bg-gray-700 px-4 py-2 rounded-full text-xs font-bold uppercase">Aro 18</button>  
    <button onclick="filtrar('19')" class="bg-gray-700 px-4 py-2 rounded-full text-xs font-bold uppercase text-yellow-500">Aro 19</button>  
    <button onclick="filtrar('20')" class="bg-gray-700 px-4 py-2 rounded-full text-xs font-bold uppercase">Aro 20</button>  
</nav>  

<main class="p-4 max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="vitrine">  

    <script>  
        const aros = ['14', '15', '16', '17', '18', '19', '20'];  
        const marcasPadrao = "Michelin | Pirelli | Goodyear | Continental | Bridgestone | Firestone | Dunlop";  

        aros.forEach((aro) => {  
            document.write(`  
                <div class="pneu-card bg-gray-800 rounded-2xl overflow-hidden border border-gray-700 shadow-2xl" data-aro="${aro}">  
                    <img src="https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?auto=format&fit=crop&q=60&w=400" class="w-full h-40 object-cover grayscale opacity-70">  
                    <div class="p-4">  
                        <h3 class="text-2xl font-black italic uppercase text-white tracking-tighter">Aro ${aro}</h3>  
                        <p class="text-[9px] text-yellow-500 font-bold mb-3 uppercase leading-tight">${marcasPadrao}</p>  
                        <p class="text-[11px] text-gray-200 font-semibold leading-tight mb-4 uppercase">  
                            Novos, Seminovos e Meia-Vida. Originais.<br>Consulte disponibilidade para retirada imediata na RN Pneus.  
                        </p>  
                        <a href="https://wa.me/5531900000000?text=Olá RN Pneus! Vi o Aro ${aro} no site. você tem a marca: e a média: ?" class="block bg-green-600 text-center py-3 rounded-lg font-black text-sm uppercase text-white hover:bg-green-500 transition-colors">Consultar Agora</a>  
                    </div>  
                </div>  
            `);  
        });  
    </script>  

</main>  

<footer class="p-10 text-center bg-black mt-10 border-t-2 border-red-600 text-white">  
    <h2 class="text-3xl font-black text-yellow-500 uppercase italic">RN PNEUS</h2>  
    <div class="mt-4 text-[11px] text-gray-400 uppercase leading-relaxed">  
        <p class="font-bold text-white mb-1">📍 LOCALIZAÇÃO:</p>  
        <p>Rua Silva Barbosa 250 Tirol </p>  
        <p>Belo Horizonte - MG</p>  
    </div>  
    <p class="text-[9px] text-red-500 mt-8 uppercase font-bold tracking-widest italic leading-tight">Venda presencial | Sem entregas | Estoque rotativo</p>  
</footer>  

<script>  
    function filtrar(aro) {  
        const cards = document.querySelectorAll('.pneu-card');  
        cards.forEach(card => {  
            if (aro === 'todos') {  
                card.style.display = 'block';  
            } else {  
                card.style.display = card.getAttribute('data-aro') === aro ? 'block' : 'none';  
            }  
        });  
    }  
</script>

</body>  
                                                      </html>
